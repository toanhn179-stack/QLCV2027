<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskPro Elite v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #4f46e5; --secondary: #ec4899; --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.8); --text: #1e293b;
            --radius: 12px; --shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.8);
            --text: #f1f5f9; --shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; margin: 0; padding: 15px; }
        
        /* Layout */
        .app-container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        
        .glass-panel { 
            background: var(--card-bg); backdrop-filter: blur(10px); 
            border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.1);
            padding: 20px; box-shadow: var(--shadow);
        }

        /* Form & Input */
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .form-control { 
            padding: 12px; border-radius: 8px; border: 1px solid #ddd; 
            background: rgba(255,255,255,0.5); font-size: 14px;
        }

        .btn-primary { 
            background: var(--primary); color: white; border: none; 
            padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-primary:active { transform: scale(0.95); }

        /* Task List */
        .task-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.05);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive */
        @media (max-width: 850px) {
            .app-container { grid-template-columns: 1fr; }
        }

        /* Calendar Mini */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; font-size: 12px; }
        .cal-day { padding: 10px 0; border-radius: 6px; cursor: pointer; }
        .cal-day.active { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="left-col">
        <div class="glass-panel" style="margin-bottom: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 style="margin: 0; font-size: 1.2rem;"><i class="fas fa-rocket"></i> TaskPro 4.0</h2>
                <button onclick="toggleTheme()" class="btn-icon"><i class="fas fa-moon"></i></button>
            </div>
            <hr style="opacity: 0.1; margin: 15px 0;">
            <div id="stats-summary" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                </div>
        </div>

        <div class="glass-panel">
            <div class="input-group">
                <input type="text" id="taskName" class="form-control" placeholder="Việc cần làm...">
                <input type="date" id="taskDate" class="form-control">
                <select id="taskPriority" class="form-control">
                    <option value="1">Ưu tiên: Thấp</option>
                    <option value="2" selected>Ưu tiên: Trung bình</option>
                    <option value="3">Ưu tiên: Cao</option>
                </select>
                <button onclick="addTask()" class="btn-primary">Thêm nhiệm vụ</button>
            </div>
        </div>
    </aside>

    <main class="right-col">
        <div class="glass-panel" style="height: 250px; margin-bottom: 20px;">
            <canvas id="mainChart"></canvas>
        </div>

        <div class="glass-panel">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                <h3 style="margin: 0;">Danh sách công việc</h3>
                <div class="filter-group">
                    <button onclick="filterTasks('all')" class="btn-sm">Tất cả</button>
                    <button onclick="filterTasks('todo')" class="btn-sm">Cần làm</button>
                </div>
            </div>
            <div id="taskList">
                </div>
        </div>
    </main>
</div>

<script type="module">
    // Firebase Configuration (Giữ nguyên của bạn)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, updateDoc, doc, query, orderBy } 
           from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDai58bCnAxR3FvOU0yF4qgqqNBnYJq-mQ",
        authDomain: "hnt-qlvh-2026.firebaseapp.com",
        projectId: "hnt-qlvh-2026",
        storageBucket: "hnt-qlvh-2026.firebasestorage.app",
        messagingSenderId: "306677162390",
        appId: "1:306677162390:web:3e8cddca8067771ccdbdb7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let tasks = [];
    let myChart;

    // --- Core Functions ---
    
    // Tải dữ liệu thời gian thực
    onSnapshot(query(collection(db, "tasks"), orderBy("createdAt", "desc")), (snapshot) => {
        tasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderUI();
    });

    window.addTask = async () => {
        const name = document.getElementById('taskName').value;
        const date = document.getElementById('taskDate').value;
        const priority = document.getElementById('taskPriority').value;

        if(!name || !date) return Swal.fire('Lỗi', 'Vui lòng điền đủ thông tin', 'error');

        try {
            await addDoc(collection(db, "tasks"), {
                name, date, priority, status: 'todo', createdAt: Date.now()
            });
            document.getElementById('taskName').value = '';
            Swal.fire({ title: 'Đã thêm!', icon: 'success', toast: true, position: 'top-end', timer: 2000, showConfirmButton: false });
        } catch (e) { console.error(e); }
    };

    window.toggleStatus = async (id, currentStatus) => {
        const newStatus = currentStatus === 'done' ? 'todo' : 'done';
        await updateDoc(doc(db, "tasks", id), { status: newStatus });
    };

    window.deleteTask = async (id) => {
        const res = await Swal.fire({ title: 'Xác nhận xóa?', icon: 'warning', showCancelButton: true });
        if(res.isConfirmed) await deleteDoc(doc(db, "tasks", id));
    };

    function renderUI() {
        const list = document.getElementById('taskList');
        list.innerHTML = tasks.map(t => `
            <div class="task-item">
                <div style="display:flex; align-items:center; gap: 15px;">
                    <input type="checkbox" ${t.status === 'done' ? 'checked' : ''} onclick="toggleStatus('${t.id}', '${t.status}')">
                    <div style="${t.status === 'done' ? 'text-decoration: line-through; opacity: 0.6' : ''}">
                        <strong>${t.name}</strong><br>
                        <small><i class="far fa-calendar"></i> ${t.date}</small>
                    </div>
                </div>
                <button onclick="deleteTask('${t.id}')" style="background:none; border:none; color:#ff4d4d; cursor:pointer;">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        `).join('');

        updateChart();
        updateStats();
    }

    function updateStats() {
        const done = tasks.filter(t => t.status === 'done').length;
        const total = tasks.length;
        document.getElementById('stats-summary').innerHTML = `
            <div class="glass-panel" style="text-align:center; padding:10px;">
                <small>Hoàn thành</small><br><strong>${done}/${total}</strong>
            </div>
            <div class="glass-panel" style="text-align:center; padding:10px;">
                <small>Tỉ lệ</small><br><strong>${total ? Math.round(done/total*100) : 0}%</strong>
            </div>
        `;
    }

    function updateChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        const done = tasks.filter(t => t.status === 'done').length;
        const todo = tasks.length - done;

        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7', 'CN'],
                datasets: [{
                    label: 'Việc hoàn thành',
                    data: [done, done+1, done-1, done, done+2, done, done], // Demo logic
                    borderColor: '#4f46e5',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(79, 70, 229, 0.1)'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    window.toggleTheme = () => {
        const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', theme);
    };
</script>
</body>
</html>
